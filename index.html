<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tonic Tiers — Competitive Minecraft PvP Leaderboard</title>
<meta name="description" content="Point-based rankings across 8 Minecraft PvP game modes with high and low tiers, retired multipliers, and combat titles.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --bg:#060911;
  --panel:#0b0f19;
  --panel2:#101624;
  --panel3:#151c2e;
  --border:#1f293d;
  --border-soft:#141b29;
  --text:#f1f5f9;
  --text-dim:#94a3b8;
  --text-dimmer:#64748b;
  --gold:#f5c518;
  --gold-soft:#eab308;
  --discord-brand:#5865F2;
  --discord-hover:#4752C4;

  --c-vanilla:#a855f7;
  --c-uhc:#ef4444;
  --c-pot:#ec4899;
  --c-nethop:#6366f1;
  --c-smp:#14b8a6;
  --c-sword:#0ea5e9;
  --c-axe:#38bdf8;
  --c-mace:#60a5fa;

  --t1:#f5c518;
  --t2:#cbd5e1;
  --t3:#f97316;
  --t4:#38bdf8;
  --t5:#2dd4bf;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(1200px 600px at 15% -10%, rgba(245,197,24,0.06) 0%, transparent 55%),
    radial-gradient(900px 500px at 90% 5%, rgba(88,101,242,0.06) 0%, transparent 55%),
    radial-gradient(1200px 600px at 20% -10%, #0d1527 0%, var(--bg) 100%);
  background-attachment:fixed;
  color:var(--text);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
.top-scan{
  position:sticky;top:0;z-index:50;height:3px;width:100%;
  background:linear-gradient(90deg,var(--gold),var(--c-sword),var(--discord-brand),var(--gold));
  background-size:300% 100%;
  animation:scan 7s linear infinite;
}
@keyframes scan{0%{background-position:0% 0;}100%{background-position:300% 0;}}
.mono{font-family:'JetBrains Mono',monospace;}
.display{font-family:'Space Grotesk',sans-serif;}
button{font-family:inherit;cursor:pointer;}
a{text-decoration:none;color:inherit;}
::selection{background:var(--gold);color:#1a1200;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px;}
::-webkit-scrollbar-track{background:transparent;}

/* ---------- header ---------- */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 32px;border-bottom:1px solid var(--border-soft);
  background:rgba(6,9,17,0.75);backdrop-filter:blur(12px);
  position:sticky;top:3px;z-index:40;gap:20px;flex-wrap:wrap;
}
.logo{display:flex;align-items:center;gap:12px;cursor:pointer;flex-shrink:0;transition:.15s;}
.logo:hover {opacity:.95;transform:scale(1.02);}
.logo-badge{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#f5c518,#e11d48);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:18px;color:#fff;font-family:'Space Grotesk',sans-serif;
  box-shadow:0 4px 16px rgba(245,197,24,0.25);
  transition:.2s;
}
.logo:hover .logo-badge{transform:rotate(-6deg) scale(1.05);}
.logo-text{line-height:1.05;}
.logo-text .t1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;letter-spacing:0.5px;}
.logo-text .t2{font-size:10px;letter-spacing:3px;color:var(--text-dimmer);font-weight:700;}
.nav{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.nav-link{
  display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;
  color:var(--text-dim);font-size:14px;font-weight:500;transition:.15s;
  border:1px solid transparent;background:none;
}
.nav-link:hover{color:var(--text);background:var(--panel2);}
.nav-link.active{color:var(--text);background:var(--panel2);border-color:var(--border);}
.nav-link svg{width:16px;height:16px;opacity:.85;flex-shrink:0;}

/* Highlight Discord Action Tab */
.nav-link.discord-tab {
  color:#fff;
  background:var(--discord-brand);
  font-weight:600;
  box-shadow:0 4px 12px rgba(88,101,242,0.2);
}
.nav-link.discord-tab:hover {
  background:var(--discord-hover);
  box-shadow:0 6px 16px rgba(88,101,242,0.35);
  transform:translateY(-1px);
}

.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.search-box{
  display:flex;align-items:center;gap:8px;background:var(--panel2);
  border:1px solid var(--border);border-radius:9px;padding:9px 14px;
  min-width:240px;color:var(--text-dimmer);
}
.search-box input{
  background:none;border:none;outline:none;color:var(--text);font-size:14px;width:100%;font-family:inherit;
}
.search-box svg{width:16px;height:16px;flex-shrink:0;}
.kbd{
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dimmer);
  border:1px solid var(--border);border-radius:5px;padding:1px 6px;
}
.btn{
  border-radius:9px;padding:10px 16px;font-size:14px;font-weight:600;border:1px solid var(--border);
  background:var(--panel2);color:var(--text);display:flex;align-items:center;gap:8px;transition:.15s ease;white-space:nowrap;
}
.btn svg{width:16px;height:16px;}
.btn:hover{background:var(--panel3);transform:translateY(-1px);border-color:var(--text-dimmer);}
.btn:active{transform:translateY(0);}
.btn-gold{background:var(--gold);color:#191200;border-color:var(--gold);box-shadow:0 0 0 rgba(245,197,24,0);}
.btn-gold:hover{background:var(--gold-soft);box-shadow:0 6px 18px rgba(245,197,24,0.35);border-color:var(--gold-soft);}
.btn-admin{border-color:#2a3550;}
.btn-admin.on{background:rgba(56,189,248,0.12);border-color:#38bdf8;color:#7fd6fb;box-shadow:0 0 0 3px rgba(56,189,248,0.08);}
.icon-btn{
  width:38px;height:38px;border-radius:9px;border:1px solid var(--border);background:var(--panel2);
  display:flex;align-items:center;justify-content:center;color:var(--text-dim);flex-shrink:0;
}
.icon-btn svg{width:16px;height:16px;}
.icon-btn:hover{color:var(--text);background:var(--panel3);}

/* ---------- layout ---------- */
.page{max-width:1340px;margin:0 auto;padding:0 32px 80px;}
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:20px;
  border:1px solid rgba(245,197,24,0.25);background:rgba(245,197,24,0.06);color:var(--gold);
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;letter-spacing:1.5px;
}
.eyebrow svg{width:14px;height:14px;}

/* ---------- hero ---------- */
.hero{padding:96px 0 64px;position:relative;overflow:hidden;}
.hero::before, .hero::after{
  content:'';position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;
}
.hero::before{width:460px;height:460px;background:rgba(245,197,24,0.14);top:-180px;left:-100px;}
.hero::after{width:400px;height:400px;background:rgba(88,101,242,0.12);top:-60px;right:-60px;}
.hero-grid{
  position:absolute;inset:0;z-index:0;opacity:.4;pointer-events:none;
  background-image:
    linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:36px 36px;
  mask-image:linear-gradient(to bottom, black, transparent 90%);
}
.hero > *{position:relative;z-index:1;}
.hero h1{
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:58px;line-height:1.05;
  margin:24px 0 20px;letter-spacing:-1.5px;max-width:820px;
}
.hero h1 .accent{
  background:linear-gradient(100deg,var(--gold) 20%,#ffe08a 50%,var(--gold) 80%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.hero p{color:var(--text-dim);font-size:18px;line-height:1.65;max-width:620px;margin:0 0 36px;}
.hero-actions{display:flex;gap:14px;flex-wrap:wrap;}
.btn-lg{padding:14px 24px;font-size:15px;border-radius:10px;}

/* Discord Primary Button Style */
.btn-discord {
  background:var(--discord-brand);
  color:#fff;
  border-color:var(--discord-brand);
}
.btn-discord:hover {
  background:var(--discord-hover);
  border-color:var(--discord-hover);
  box-shadow:0 6px 20px rgba(88,101,242,0.3);
}

@keyframes fadeInUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.modes-grid .mode-card:nth-child(1){animation-delay:.02s;} .modes-grid .mode-card:nth-child(2){animation-delay:.06s;}
.modes-grid .mode-card:nth-child(3){animation-delay:.10s;} .modes-grid .mode-card:nth-child(4){animation-delay:.14s;}
.modes-grid .mode-card:nth-child(5){animation-delay:.18s;} .modes-grid .mode-card:nth-child(6){animation-delay:.22s;}
.modes-grid .mode-card:nth-child(7){animation-delay:.26s;} .modes-grid .mode-card:nth-child(8){animation-delay:.30s;}
.modes-grid .mode-card:nth-child(9){animation-delay:.34s;} .modes-grid .mode-card:nth-child(10){animation-delay:.38s;}
.info-cards .info-card:nth-child(1){animation-delay:.1s;} .info-cards .info-card:nth-child(2){animation-delay:.16s;} .info-cards .info-card:nth-child(3){animation-delay:.22s;}
.rank-list .rank-row{animation:fadeInUp .4s ease both;}
.rank-list .rank-row:nth-child(1){animation-delay:.02s;} .rank-list .rank-row:nth-child(2){animation-delay:.06s;}
.rank-list .rank-row:nth-child(3){animation-delay:.10s;} .rank-list .rank-row:nth-child(4){animation-delay:.14s;}
.rank-list .rank-row:nth-child(n+5){animation-delay:.16s;}
.tier-board .tier-col{animation:fadeInUp .4s ease both;}

@media (prefers-reduced-motion: reduce){
  .top-scan{animation:none;}
  .mode-card, .info-card, .rank-row, .tier-col{animation:none;}
}

/* ---------- game modes grid (home) ---------- */
.section-head{margin:64px 0 24px;}
.section-head h2{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;margin:0 0 6px;}
.section-head p{color:var(--text-dim);font-size:15px;margin:0;}
.modes-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}
.mode-card{
  background:var(--panel);border:1px solid var(--border-soft);border-radius:14px;padding:28px 20px;
  text-align:center;transition:.2s cubic-bezier(0.16, 1, 0.3, 1);animation:fadeInUp .5s ease both;
}
.mode-card:hover{
  border-color:color-mix(in srgb, currentColor 55%, var(--border));
  background:var(--panel2);transform:translateY(-4px);
  box-shadow:0 14px 32px -12px color-mix(in srgb, currentColor 65%, transparent);
}
.mode-icon-wrap{
  width:54px;height:54px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;
  border:1.5px solid currentColor;background:color-mix(in srgb, currentColor 12%, transparent);transition:.2s ease;
}
.mode-card:hover .mode-icon-wrap{transform:scale(1.1);background:color-mix(in srgb, currentColor 22%, transparent);}
.mode-icon-wrap svg{width:24px;height:24px;}
.mode-card h3{font-size:16px;font-weight:600;margin:0 0 6px;}
.mode-card .tag{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dimmer);letter-spacing:1.5px;}

.info-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px;}
.info-card{
  background:var(--panel);border:1px solid var(--border-soft);border-radius:14px;padding:24px;
  transition:.2s ease;animation:fadeInUp .5s ease both;
}
.info-card:hover{border-color:var(--border);transform:translateY(-2px);background:var(--panel2);}
.info-card .ic-icon{
  width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;
}
.info-card .ic-icon svg{width:18px;height:18px;}
.info-card h4{font-size:16px;font-weight:600;margin:0 0 6px;}
.info-card p{font-size:14px;color:var(--text-dim);line-height:1.6;margin:0;}

/* ---------- rankings ---------- */
.mode-tabs{
  display:flex;gap:6px;padding:16px 0;border-bottom:1px solid var(--border-soft);overflow-x:auto;margin-bottom:28px;
}
.mode-tab{
  display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 18px;border-radius:10px;
  color:var(--text-dimmer);font-size:13px;font-weight:600;flex-shrink:0;border:1px solid transparent;position:relative;
  background:none;transition:0.15s;
}
.mode-tab svg{width:18px;height:18px;}
.mode-tab.active{color:var(--text);background:var(--panel2);border-color:var(--border);}
.mode-tab.active::after{
  content:'';position:absolute;bottom:-17px;left:18px;right:18px;height:2.5px;background:var(--gold);border-radius:2px;
}
.mode-tab:hover:not(.active){color:var(--text-dim);background:rgba(255,255,255,0.02);}

.rankings-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:18px;margin-bottom:32px;}
.rankings-head h1{
  font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;display:flex;align-items:center;gap:14px;margin:0 0 6px;
}
.rankings-head h1 svg{width:32px;height:32px;}
.rankings-head .sub{color:var(--text-dim);font-size:14.5px;margin:0;}
.head-actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.server-widget{
  display:flex;align-items:center;gap:12px;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:8px 16px;
}
.server-widget .pill{
  background:#2d1610;color:#ff9080;font-size:10px;font-weight:700;padding:4px 8px;border-radius:6px;letter-spacing:0.5px;text-align:center;
}
.server-widget .lbl{font-size:10px;color:var(--text-dimmer);letter-spacing:1px;font-weight:600;}
.server-widget .ip{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:14px;color:#fff;}
.server-widget button{background:none;border:none;color:var(--text-dimmer);display:flex;padding:4px;border-radius:4px;transition:0.15s;}
.server-widget button svg{width:15px;height:15px;}
.server-widget button:hover{color:var(--text);background:rgba(255,255,255,0.05);}

/* list rankings */
.rank-list{display:flex;flex-direction:column;gap:12px;}
.rank-row{
  display:flex;align-items:center;gap:20px;background:var(--panel);border:1px solid var(--border-soft);border-radius:14px;
  padding:16px 20px;transition:.18s cubic-bezier(0.16, 1, 0.3, 1);
}
.rank-row:hover{border-color:var(--border);background:var(--panel2);transform:translateX(4px);box-shadow:0 4px 20px rgba(0,0,0,0.25);}
.rank-num{
  width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;flex-shrink:0;color:#1a1200;
  position:relative;overflow:hidden;
}
.rank-num.n1{background:linear-gradient(145deg,#fbd94a,#d9a916);box-shadow:0 4px 18px -4px rgba(245,197,24,0.5);}
.rank-num.n2{background:linear-gradient(145deg,#e2e8f0,#94a3b8);box-shadow:0 4px 16px -4px rgba(148,163,184,0.35);}
.rank-num.n3{background:linear-gradient(145deg,#fb923c,#c2410c);box-shadow:0 4px 16px -4px rgba(194,65,12,0.35);}
.rank-num.other{background:var(--panel2);color:var(--text-dim);border:1px solid var(--border);}
.avatar{
  width:46px;height:46px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:#fff;
}
.player-info{min-width:180px;}
.player-info .name{font-weight:600;font-size:16px;display:block;color:#fff;}
.player-info .meta{display:flex;align-items:center;gap:6px;color:var(--text-dimmer);font-size:13px;margin-top:4px;}
.player-info .meta svg{width:13px;height:13px;}
.region-tag{
  background:var(--panel2);border:1px solid var(--border);color:#4ade80;font-size:11px;font-weight:600;
  padding:4px 10px;border-radius:6px;flex-shrink:0;letter-spacing:0.5px;
}
.badges-row{display:flex;gap:10px;margin-left:auto;flex-shrink:0;}
.badge-stack{display:flex;flex-direction:column;align-items:center;gap:4px;}
.badge-circle{
  width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:.18s ease;
}
.badge-stack:hover .badge-circle:not(.empty){
  transform:scale(1.15);
  box-shadow:0 0 0 4px color-mix(in srgb, currentColor 20%, transparent);
}
.badge-circle svg{width:16px;height:16px;}
.badge-circle.empty{border:1.5px dashed var(--border);}
.badge-tier-tag{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;
}
.row-admin-del{
  width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--panel2);
  display:flex;align-items:center;justify-content:center;color:#f87171;flex-shrink:0;transition:0.15s;
}
.row-admin-del svg{width:15px;height:15px;}
.row-admin-del:hover{background:rgba(239,68,68,0.15);border-color:#7f1d1d;color:#ef4444;}
.empty-state{
  text-align:center;padding:72px 20px;color:var(--text-dimmer);border:1px dashed var(--border);border-radius:14px;
}
.empty-state svg{width:36px;height:36px;margin-bottom:14px;opacity:.5;}
.empty-state p{margin:0;font-size:15px;}

/* tier board */
.tier-board{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}
.tier-col{
  background:var(--panel);border:1px solid var(--border-soft);border-radius:14px;overflow:hidden;
  transition:.2s cubic-bezier(0.16, 1, 0.3, 1);
}
.tier-col:hover{border-color:var(--border);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.2);}
.tier-col-head{
  padding:18px 20px;border-bottom:1px solid var(--border-soft);display:flex;align-items:baseline;justify-content:space-between;
  position:relative;
}
.tier-col-head::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;background:currentColor;opacity:.8;
}
.tier-col-head .tname{font-weight:700;font-size:15px;}
.tier-col-head .tcount{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text-dimmer);}
.tier-sub{padding:16px 18px;}
.tier-sub-label{
  font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:700;margin-bottom:12px;letter-spacing:0.5px;
}
.tier-sub-list{display:flex;flex-direction:column;gap:10px;min-height:30px;}
.tier-player{display:flex;align-items:center;gap:10px;}
.tier-player .av-sm{
  width:24px;height:24px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;
}
.tier-player .pname{font-size:14px;font-weight:500;}
.tier-player .preg{font-size:11px;color:var(--text-dimmer);margin-left:auto;}
.tier-empty-dash{color:var(--text-dimmer);font-size:14px;}
.tier-divider{border-top:1px dashed var(--border-soft);}

/* modals */
.overlay{
  position:fixed;inset:0;background:rgba(3,5,9,0.8);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;
  animation:overlayIn .15s ease both;
}
@keyframes overlayIn{from{opacity:0;}to{opacity:1;}}
@keyframes modalIn{from{opacity:0;transform:translateY(12px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal{
  background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:28px 32px;
  width:100%;max-height:88vh;overflow-y:auto;
  box-shadow:0 30px 70px -20px rgba(0,0,0,0.7);
  animation:modalIn .22s cubic-bezier(.16,1,.3,1) both;
}
.modal-head h2{display:flex;align-items:center;gap:10px;}
.modal-head h2 svg{width:20px;height:20px;color:var(--gold);}
.modal-password .field{margin-bottom:6px;}
.field-invalid{border-color:#ef4444 !important;}
.field-error{
  display:flex;align-items:center;gap:6px;color:#f87171;font-size:13px;margin:8px 0 18px;
}
.field-error svg{width:14px;height:14px;flex-shrink:0;}
@media (prefers-reduced-motion: reduce){
  .overlay, .modal{animation:none;}
}
.modal.modal-sm{max-width:520px;}
.modal.modal-lg{max-width:740px;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-head h2{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin:0;}
.modal-close{background:none;border:none;color:var(--text-dimmer);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:0.15s;}
.modal-close:hover{background:var(--panel2);color:var(--text);}
.modal-close svg{width:20px;height:20px;}
.modal p.desc{color:var(--text-dim);font-size:14px;line-height:1.6;margin:0 0 22px;}
.pv-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dimmer);letter-spacing:1.5px;margin-bottom:12px;}
.pv-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px;}
.pv-cell{border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;background:var(--panel2);}
.pv-cell .tg{
  display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:3px 8px;
  border-radius:5px;margin-bottom:8px;
}
.pv-cell .pts{font-size:13px;color:var(--text-dim);font-weight:600;}
.retired-note{font-size:13.5px;color:var(--text-dim);margin-bottom:24px;}
.title-list{display:flex;flex-direction:column;gap:10px;}
.title-row{display:flex;justify-content:space-between;align-items:center;font-size:14px;}
.title-row .name{font-weight:600;}
.title-row .thr{font-family:'JetBrains Mono',monospace;color:var(--text-dimmer);font-size:12.5px;}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.field label{display:block;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dimmer);letter-spacing:1px;margin-bottom:8px;}
.field input, .field select{
  width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:12px;
  color:var(--text);font-size:14px;font-family:inherit;outline:none;
}
.field input:focus, .field select:focus{border-color:var(--gold);}
.tiers-legend{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dimmer);letter-spacing:1px;margin:6px 0 14px;}
.tier-assign-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 18px;margin-bottom:24px;}
.tier-assign{display:flex;align-items:center;gap:12px;}
.tier-assign .ta-icon{width:24px;height:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.tier-assign .ta-icon svg{width:18px;height:18px;}
.tier-assign .ta-name{font-size:14px;font-weight:600;width:64px;flex-shrink:0;}
.tier-assign select{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13.5px;font-family:inherit;}
.ta-check{display:flex;align-items:center;gap:6px;flex-shrink:0;font-size:12px;color:var(--text-dimmer);cursor:pointer;}
.ta-check input{accent-color:var(--gold);}
.modal-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:12px;}

.toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--panel3);border:1px solid var(--border);
  color:var(--text);padding:14px 24px;border-radius:10px;font-size:14px;font-weight:500;z-index:200;
  box-shadow:0 12px 36px rgba(0,0,0,0.5);display:flex;align-items:center;gap:10px;
}
.toast svg{width:16px;height:16px;color:#4ade80;}

@media (max-width:1080px){
  .modes-grid{grid-template-columns:repeat(3,1fr);}
  .info-cards{grid-template-columns:1fr;}
  .tier-board{grid-template-columns:repeat(2,1fr);}
  .form-grid,.tier-assign-grid{grid-template-columns:1fr;}
}
@media (max-width:680px){
  .modes-grid{grid-template-columns:repeat(2,1fr);}
  .hero h1{font-size:40px;}
  .badges-row{display:none;}
  .tier-board{grid-template-columns:1fr;}
}
</style>
</head>

<div id="app"></div>
<script>
/* ---------------- config ---------------- */
const DISCORD_INVITE_URL = 'https://discord.gg/yourserver'; // Replace with your actual invite link

/* ---------------- icons ---------------- */
const ICONS = {

  pickaxe:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 12.5 20 18a1.5 1.5 0 0 1-2 2l-5.5-5.5M5 8c1.5-3 4.5-5.5 8-6 .5 2.5-1 5.5-3 7.5S5.5 12 3 11.5C3.5 10 4 9 5 8Z"/><path d="M3.5 20.5 9 15"/></svg>`,
  hammer:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 12-8.5 8.5a1.5 1.5 0 0 1-2-2L13 10"/><path d="M17.5 5.5 21 9l-3 3-6-6 3-3 2.5 2.5Z"/></svg>`,
  home:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1V10.5Z"/></svg>`,
  discord:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-4.39 11.56c-.63 0-1.13-.56-1.13-1.25s.49-1.25 1.13-1.25c.64 0 1.14.56 1.14 1.25s-.5 1.25-1.14 1.25zm-7.22 0c-.63 0-1.13-.56-1.13-1.25s.49-1.25 1.13-1.25c.64 0 1.14.56 1.14 1.25s-.5 1.25-1.14 1.25z"/></svg>`,

  search:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>`,

  zap:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z"/></svg>`,
  check:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>`,
  inbox:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2 3h6l2-3h4"/><path d="M5 4h14l2 8v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-6L5 4Z"/></svg>`,
  lock:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>`,
  unlock:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 7.4-2.1"/></svg>`,
};

/* ---------------- data ---------------- */
const MODES = [
  {key:'overall', label:'Overall', icon:'trophy', color:'#f5c518'},
  {key:'ltms',    label:'LTMs',    icon:'swords', color:'#e2e8f0'},
  {key:'vanilla', label:'Vanilla', icon:'gem',    color:'#a855f7'},
  {key:'uhc',     label:'UHC',     icon:'heart',  color:'#ef4444'},
  {key:'pot',     label:'Pot',     icon:'flask',  color:'#ec4899'},
  {key:'nethop',  label:'NethOP',  icon:'ghost',  color:'#6366f1'},
  {key:'smp',     label:'SMP',     icon:'circleDot', color:'#14b8a6'},
  {key:'sword',   label:'Sword',   icon:'sword',  color:'#0ea5e9'},
  {key:'axe',     label:'Axe',     icon:'pickaxe',color:'#38bdf8'},
  {key:'mace',    label:'Mace',    icon:'hammer', color:'#60a5fa'},
];
const RANKED_MODES = MODES.filter(m=>!['overall','ltms'].includes(m.key));
const TIER_COLORS = {1:'var(--t1)',2:'var(--t2)',3:'var(--t3)',4:'var(--t4)',5:'var(--t5)'};
const POINTS_HT = {1:60,2:28,3:10,4:3,5:1};
const POINTS_LT = {1:44,2:16,3:6,4:2,5:0.5};
const TITLES = [
  {name:'Combat Grandmaster', min:400, color:'#f472b6'},
  {name:'Combat Master',      min:250, color:'#f5c518'},
  {name:'Combat Ace',         min:100, color:'#ef4444'},
  {name:'Combat Specialist',  min:50,  color:'#2dd4bf'},
  {name:'Combat Cadet',       min:20,  color:'#e2e8f0'},
  {name:'Combat Novice',      min:10,  color:'#e2e8f0'},
  {name:'Combat Rookie',      min:0,   color:'#6b7686'},
];
const REGIONS = ['NA','EU','AS','OCE','SA'];
const AVATAR_COLORS = ['#e0779f','#4ade80','#38bdf8','#f97316','#a855f7','#f5c518','#ef4444','#2dd4bf'];
const ADMIN_PASSWORD = 'TonicTLAdmin-12';

function seedPlayers(){
  return [
    {id:'p1', username:'elmeriizzzz', region:'EU', color:'#e0779f',
      tiers:{vanilla:{tier:2,high:false,retired:false}, uhc:{tier:4,high:false,retired:false}, pot:{tier:4,high:true,retired:false},
             nethop:{tier:4,high:false,retired:false}, smp:{tier:4,high:false,retired:false}, sword:{tier:4,high:true,retired:false},
             axe:{tier:4,high:false,retired:false}, mace:{tier:3,high:false,retired:false}}},
    {id:'p2', username:'Adzmi', region:'EU', color:'#4ade80',
      tiers:{vanilla:{tier:5,high:false,retired:false}, uhc:{tier:5,high:false,retired:false}, pot:{tier:5,high:true,retired:false},
             nethop:{tier:4,high:true,retired:false}, smp:{tier:4,high:false,retired:false}, sword:{tier:5,high:true,retired:false},
             axe:{tier:5,high:false,retired:false}, mace:{tier:4,high:true,retired:false}}},
    {id:'p3', username:'Alawyynn', region:'EU', color:'#94a3b8',
      tiers:{vanilla:null, uhc:null, pot:null, nethop:null, smp:null, sword:null, axe:null,
             mace:{tier:4,high:false,retired:false}}},
  ];
}

let state = {
  view:'home',
  activeMode:'overall',
  adminMode:false,
  search:'',
  players:[],
  showPointModal:false,
  showAddModal:false,
  showPasswordModal:false,
  passwordError:'',
  toast:null,
};

/* ---------------- persistence (browser localStorage) ---------------- */
const STORAGE_KEY = 'tonic_tiers_players';
async function loadPlayers(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){ state.players = JSON.parse(raw); return; }
  }catch(e){ /* storage unavailable or corrupt */ }
  state.players = seedPlayers();
  savePlayers();
}
async function savePlayers(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state.players)); }catch(e){ console.error('save failed', e); }
}

/* ---------------- helpers ---------------- */
function modeByKey(k){ return MODES.find(m=>m.key===k); }
function pointsFor(entry){
  if(!entry || !entry.tier) return 0;
  const base = entry.high ? POINTS_HT[entry.tier] : POINTS_LT[entry.tier];
  return entry.retired ? base*0.5 : base;
}
function totalPoints(player){
  let sum=0;
  for(const m of RANKED_MODES) sum += pointsFor(player.tiers[m.key]);
  return Math.round(sum*10)/10;
}
function titleFor(pts){
  for(const t of TITLES){ if(pts>=t.min) return t; }
  return TITLES[TITLES.length-1];
}
function tierLabel(entry){
  if(!entry || !entry.tier) return null;
  return (entry.high?'HT':'LT')+entry.tier;
}
function initials(name){ return name.slice(0,2).toUpperCase(); }
function showToast(msg){
  state.toast = msg; render();
  setTimeout(()=>{ state.toast=null; render(); }, 2200);
}
function escHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function openDiscord(){ window.open(DISCORD_INVITE_URL, '_blank'); }

/* ---------------- header ---------------- */
function renderHeader(){
  return `
  <div class="header">
    <div class="logo" onclick="goHome()">
      <div class="logo-badge">T</div>
      <div class="logo-text">
        <div class="t1">TONIC</div>
        <div class="t2">TIERS</div>
      </div>
    </div>
    <div class="nav">
      <button class="nav-link ${state.view==='home'?'active':''}" onclick="goHome()">${ICONS.home} Home</button>
      <button class="nav-link ${state.view==='rankings'?'active':''}" onclick="goRankings('overall')">${ICONS.trophy} Rankings</button>
      <button class="nav-link discord-tab" onclick="openDiscord()">${ICONS.discord} Join Discord</button>
      <button class="nav-link" onclick="showToast('API docs aren\\'t part of this demo')">${ICONS.book} API Docs</button>
    </div>
    <div class="header-right">
      <div class="search-box">
        ${ICONS.search}
        <input placeholder="Search player..." value="${escHtml(state.search)}" oninput="onSearch(this.value)">
        <span class="kbd">/</span>
      </div>
      <button class="btn btn-admin ${state.adminMode?'on':''}" onclick="toggleAdmin()">${state.adminMode?ICONS.unlock:ICONS.lock} ${state.adminMode?'Admin Mode':'Admin'}</button>
      ${state.adminMode?`<button class="icon-btn" title="Log out" onclick="toggleAdmin()">${ICONS.logout}</button>`:''}
    </div>
  </div>`;
}

/* ---------------- home ---------------- */
function renderHome(){
  const modeCards = MODES.map(m=>`
    <div class="mode-card" style="color:${m.color}" onclick="goRankings('${m.key}')">
      <div class="mode-icon-wrap">${ICONS[m.icon]}</div>
      <h3 style="color:var(--text)">${m.label}</h3>
      <div class="tag">RANKED</div>
    </div>`).join('');

  return `
  <div class="page">
    <div class="hero">
      <div class="hero-grid"></div>
      <div class="eyebrow">${ICONS.zap} COMPETITIVE MINECRAFT PVP</div>
      <h1 class="display">The Official <span class="accent">Tonic Tiers</span><br>Leaderboard.</h1>
      <p>Point-based rankings across 8 game modes with high and low tiers, retired multipliers, and combat titles. Master the meta. Climb the tiers.</p>
      <div class="hero-actions">
        <button class="btn btn-gold btn-lg" onclick="goRankings('overall')">${ICONS.trophy} View Rankings</button>
        <button class="btn btn-discord btn-lg" onclick="openDiscord()">${ICONS.discord} Connect On Discord</button>
      </div>
    </div>

    <div class="section-head">
      <h2>Game Modes</h2>
      <p>Ten ranked categories, one competitive ecosystem.</p>
    </div>
    <div class="modes-grid">${modeCards}</div>

    <div class="info-cards">
      <div class="info-card">
        <div class="ic-icon" style="background:rgba(245,197,24,0.12);color:var(--gold)">${ICONS.trophy}</div>
        <h4>Point System</h4>
        <p>HT1 = 60pts, down to LT5 = 1pt. Retired tiers count at 50%.</p>
      </div>
      <div class="info-card">
        <div class="ic-icon" style="background:rgba(88,101,242,0.12);color:var(--discord-brand)">${ICONS.discord}</div>
        <h4>Discord Community</h4>
        <p>Join live matchmaking channels, track scrim milestones, and challenge top tiered duelists directly.</p>
      </div>
      <div class="info-card">
        <div class="ic-icon" style="background:rgba(236,72,153,0.12);color:#ec4899">${ICONS.zap}</div>
        <h4>Live Overlay</h4>
        <p>Tier badges update instantly across all game modes and profiles.</p>
      </div>
    </div>
  </div>`;
}

/* ---------------- rankings ---------------- */
function renderRankings(){
  const tabs = MODES.map(m=>`
    <button class="mode-tab ${state.activeMode===m.key?'active':''}" style="color:${state.activeMode===m.key?'var(--text)':''}" onclick="goRankings('${m.key}')">
      <span style="color:${m.color}">${ICONS[m.icon]}</span>${m.label}
    </button>`).join('');

  const mode = modeByKey(state.activeMode);
  const body = (state.activeMode==='overall') ? renderOverallList() : renderTierBoard(mode);

  return `
  <div class="page">
    <div class="mode-tabs">${tabs}</div>
    <div class="rankings-head">
      <div>
        <h1><span style="color:${mode.color}">${ICONS[mode.icon]}</span>${mode.label} Rankings</h1>
        <p class="sub">Official Tonic Tiers competitive PvP leaderboard</p>
      </div>
      <div class="head-actions">
        ${state.adminMode?`<button class="btn btn-gold" onclick="openAddModal()">${ICONS.plus} Add Player</button>`:''}
        <button class="btn" onclick="togglePointModal(true)">${ICONS.info} Information</button>
        <div class="server-widget">
          <div>
            <span class="pill">PVP<br>CLUB</span>
          </div>
          <div>
            <div class="lbl">SERVER IP</div>
            <div class="ip">tonic.gg</div>
          </div>
          <button onclick="copyIp()">${ICONS.copy}</button>
        </div>
      </div>
    </div>
    ${body}
  </div>`;
}

function filteredPlayers(){
  const q = state.search.trim().toLowerCase();
  if(!q) return state.players;
  return state.players.filter(p=>p.username.toLowerCase().includes(q));
}

function renderOverallList(){
  const players = filteredPlayers()
    .map(p=>({p, pts: totalPoints(p)}))
    .sort((a,b)=>b.pts-a.pts);

  if(players.length===0){
    return `<div class="empty-state">${ICONS.inbox}<p>No players found${state.search?` for "${escHtml(state.search)}"`:''}.</p></div>`;
  }

  const rows = players.map((row,i)=>{
    const {p, pts} = row;
    const title = titleFor(pts);
    const rankClass = i===0?'n1':i===1?'n2':i===2?'n3':'other';
    const badges = RANKED_MODES.map(m=>{
      const entry = p.tiers[m.key];
      const lbl = tierLabel(entry);
      if(!lbl){
        return `<div class="badge-stack"><div class="badge-circle empty" style="color:var(--border)"></div></div>`;
      }
      const col = TIER_COLORS[entry.tier];
      return `<div class="badge-stack">
        <div class="badge-circle" style="border:1.5px solid ${col};color:${col};background:color-mix(in srgb, ${col} 10%, transparent)">${ICONS[m.icon]}</div>
        <div class="badge-tier-tag" style="background:color-mix(in srgb, ${col} 18%, transparent);color:${col}">${lbl}</div>
      </div>`;
    }).join('');

    return `
    <div class="rank-row">
      <div class="rank-num ${rankClass}">${i+1}</div>
      <div class="avatar" style="background:${p.color}">${initials(p.username)}</div>
      <div class="player-info">
        <span class="name">${escHtml(p.username)}</span>
        <div class="meta">${ICONS.trophy.replace('viewBox="0 0 24 24"','viewBox="0 0 24 24" style="width:12px;height:12px;color:'+title.color+'"')} <span style="color:${title.color}">${title.name}</span> <span class="mono">(${pts} points)</span></div>
      </div>
      <div class="region-tag">${p.region}</div>
      <div class="badges-row">${badges}</div>
      ${state.adminMode?`<button class="row-admin-del" onclick="deletePlayer('${p.id}')" title="Remove player">${ICONS.trash}</button>`:''}
    </div>`;
  }).join('');

  return `<div class="rank-list">${rows}</div>`;
}

function renderTierBoard(mode){
  const players = filteredPlayers();
  const cols = [1,2,3,4,5].map(tierNum=>{
    const inTier = players.filter(p=>p.tiers[mode.key] && p.tiers[mode.key].tier===tierNum);
    const ht = inTier.filter(p=>p.tiers[mode.key].high);
    const lt = inTier.filter(p=>!p.tiers[mode.key].high);
    const col = TIER_COLORS[tierNum];

    const playerRow = p=>`
      <div class="tier-player">
        <div class="av-sm" style="background:${p.color}">${initials(p.username)}</div>
        <span class="pname">${escHtml(p.username)}</span>
        <span class="preg mono">${p.region}</span>
        ${state.adminMode?`<button class="row-admin-del" style="width:22px;height:22px;margin-left:6px" onclick="deletePlayer('${p.id}')">${ICONS.trash}</button>`:''}
      </div>`;

    return `
    <div class="tier-col">
      <div class="tier-col-head" style="color:${col}">
        <span class="tname">Tier ${tierNum}</span>
        <span class="tcount">${inTier.length} players</span>
      </div>
      <div class="tier-sub">
        <div class="tier-sub-label" style="color:${col}">HT${tierNum}</div>
        <div class="tier-sub-list">${ht.length?ht.map(playerRow).join(''):'<span class="tier-empty-dash">—</span>'}</div>
      </div>
      <div class="tier-divider"></div>
      <div class="tier-sub">
        <div class="tier-sub-label" style="color:${col}">LT${tierNum}</div>
        <div class="tier-sub-list">${lt.length?lt.map(playerRow).join(''):'<span class="tier-empty-dash">—</span>'}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="tier-board">${cols}</div>`;
}

/* ---------------- point system modal ---------------- */
function renderPointModal(){
  if(!state.showPointModal) return '';
  const cells = [
    {l:'HT1',pt:60,c:'var(--t1)'},{l:'LT1',pt:44,c:'var(--t1)'},{l:'HT2',pt:28,c:'var(--t2)'},{l:'LT2',pt:16,c(--t2)'},{l:'HT3',pt:10,c:'var(--t3)'},
    {l:'LT3',pt:6,c:'var(--t3)'},{l:'HT4',pt:3,c:'var(--t4)'},{l:'LT4',pt:2,c:'var(--t4)'},{l:'HT5',pt:1,c:'var(--t5)'},{l:'LT5',pt:0.5,c:'var(--t5)'},
  ];
  const cellsHtml = cells.map(c=>`
    <div class="pv-cell">
      <div class="tg" style="background:color-mix(in srgb, ${c.c} 22%, transparent);color:${c.c}">${c.l}</div>
      <div class="pts">${c.pt}pt</div>
    </div>`).join('');
  const titleRows = TITLES.map(t=>{
    const label = t.min===0?'under 10 pts':`${t.min}+ pts`;
    return `<div class="title-row"><span class="name" style="color:${t.color}">${t.name}</span><span class="thr">${label}</span></div>`;
  }).join('');

  return `
  <div class="overlay" onclick="if(event.target===this) togglePointModal(false)">
    <div class="modal modal-sm">
      <div class="modal-head"><h2>Point System &amp; Overlay</h2><button class="modal-close" onclick="togglePointModal(false)">${ICONS.x}</button></div>
      <p class="desc">Tonic Tiers uses a competitive point-based system across 8 core game modes. Each tier assignment awards points that combine into a player's Overall score and Combat Title.</p>
      <div class="pv-label">POINT VALUES</div>
      <div class="pv-grid">${cellsHtml}</div>
      <div class="pv-label">RETIRED TIERS</div>
      <div class="retired-note">Retired tier points are counted at 50% of full value.</div>
      <div class="pv-label">COMBAT TITLES</div>
      <div class="title-list">${titleRows}</div>
    </div>
  </div>`;
}

/* ---------------- add player modal ---------------- */
function tierOptions(current){
  const opts = ['<option value="none">— none —</option>'];
  for(let t=1;t<=5;t++){ opts.push(`<option value="HT${t}">HT${t}</option>`); }
  for(let t=1;t<=5;t++){ opts.push(`<option value="LT${t}">LT${t}</option>`); }
  return opts.join('');
}

function renderAddModal(){
  if(!state.showAddModal) return '';
  const rows = RANKED_MODES.map(m=>`
    <div class="tier-assign">
      <span class="ta-icon" style="color:${m.color}">${ICONS[m.icon]}</span>
      <span class="ta-name">${m.label}</span>
      <select id="ta_${m.key}">${tierOptions()}</select>
      <label class="ta-check"><input type="checkbox" id="tr_${m.key}"> R</label>
    </div>`).join('');
  const regionOpts = REGIONS.map(r=>`<option value="${r}">${r}</option>`).join('');

  return `
  <div class="overlay" onclick="if(event.target===this) toggleAddModal(false)">
    <div class="modal modal-lg">
      <div class="modal-head"><h2>Add Player</h2><button class="modal-close" onclick="toggleAddModal(false)">${ICONS.x}</button></div>
      <div class="form-grid">
        <div class="field">
          <label>MINECRAFT USERNAME</label>
          <input id="new_username" placeholder="Notch">
        </div>
        <div class="field">
          <label>REGION</label>
          <select id="new_region">${regionOpts}</select>
        </div>
      </div>
      <div class="tiers-legend">TIER ASSIGNMENTS</div>
      <div class="tier-assign-grid">${rows}</div>
      <div class="modal-actions">
        <button class="btn" onclick="toggleAddModal(false)">Cancel</button>
        <button class="btn btn-gold" onclick="savePlayer()">Save Player</button>
      </div>
    </div>
  </div>`;
}

/* ---------------- admin password modal ---------------- */
function renderPasswordModal(){
  if(!state.showPasswordModal) return '';
  return `
  <div class="overlay" onclick="if(event.target===this) closePasswordModal()">
    <div class="modal modal-sm modal-password">
      <div class="modal-head">
        <h2>${ICONS.lock} Admin Access</h2>
        <button class="modal-close" onclick="closePasswordModal()">${ICONS.x}</button>
      </div>
      <p class="desc">Enter the admin password to add players, edit tier assignments, and remove entries from the leaderboard.</p>
      <div class="field">
        <label>PASSWORD</label>
        <input type="password" id="admin_password" placeholder="••••••••••••••••"
          class="${state.passwordError?'field-invalid':''}"
          onkeydown="if(event.key==='Enter') submitAdminPassword()">
      </div>
      ${state.passwordError?`<div class="field-error">${ICONS.x} ${escHtml(state.passwordError)}</div>`:''}
      <div class="modal-actions">
        <button class="btn" onclick="closePasswordModal()">Cancel</button>
        <button class="btn btn-gold" onclick="submitAdminPassword()">${ICONS.unlock} Unlock</button>
      </div>
    </div>
  </div>`;
}

/* ---------------- toast ---------------- */
function renderToast(){
  if(!state.toast) return '';
  return `<div class="toast">${ICONS.check}${escHtml(state.toast)}</div>`;
}

/* ---------------- actions ---------------- */
function render(){
  document.getElementById('app').innerHTML =
    '<div class="top-scan"></div>' +
    renderHeader() +
    (state.view==='home' ? renderHome() : renderRankings()) +
    renderPointModal() +
    renderAddModal() +
    renderPasswordModal() +
    renderToast();
  if(state.showPasswordModal){
    const el = document.getElementById('admin_password');
    if(el) el.focus();
  }
}
function goHome(){ state.view='home'; state.showAddModal=false; state.showPointModal=false; render(); window.scrollTo(0,0); }
function goRankings(modeKey){ state.view='rankings'; state.activeMode=modeKey; render(); window.scrollTo(0,0); }
function onSearch(v){ state.search=v; render(); }
function toggleAdmin(){
  if(state.adminMode){
    state.adminMode = false;
    showToast('Logged out of admin mode');
    return;
  }
  state.showPasswordModal = true;
  state.passwordError = '';
  render();
}
function closePasswordModal(){
  state.showPasswordModal = false;
  state.passwordError = '';
  render();
}
function submitAdminPassword(){
  const input = document.getElementById('admin_password');
  const value = input ? input.value : '';
  if(value === ADMIN_PASSWORD){
    state.adminMode = true;
    state.showPasswordModal = false;
    state.passwordError = '';
    render();
    showToast('Admin mode enabled');
  } else {
    state.passwordError = 'Incorrect password. Try again.';
    render();
    const retryInput = document.getElementById('admin_password');
    if(retryInput){ retryInput.focus(); retryInput.select(); }
  }
}
function togglePointModal(v){ state.showPointModal=v; render(); }
function openAddModal(){ state.showAddModal=true; render(); }
function toggleAddModal(v){ state.showAddModal=v; render(); }
function copyIp(){
  navigator.clipboard.writeText('tonic.gg').then(()=>showToast('Server IP copied to clipboard'));
}
function deletePlayer(id){
  state.players = state.players.filter(p=>p.id!==id);
  savePlayers();
  showToast('Player removed');
  render();
}
function savePlayer(){
  const username = document.getElementById('new_username').value.trim();
  if(!username){ showToast('Enter a username first'); return; }
  const region = document.getElementById('new_region').value;
  const tiers = {};
  for(const m of RANKED_MODES){
    const val = document.getElementById('ta_'+m.key).value;
    const retired = document.getElementById('tr_'+m.key).checked;
    if(val==='none'){ tiers[m.key]=null; }
    else{
      const high = val.startsWith('HT');
      const tier = parseInt(val.slice(2));
      tiers[m.key] = {tier, high, retired};
    }
  }
  const color = AVATAR_COLORS[Math.floor(Math.random()*AVATAR_COLORS.length)];
  state.players.push({id:'p'+Date.now(), username, region, color, tiers});
  savePlayers();
  state.showAddModal=false;
  showToast('Player added');
  render();
}

/* ---------------- init ---------------- */
(async function init(){
  await loadPlayers();
  render();
})();
</script>
</body>
</html>
